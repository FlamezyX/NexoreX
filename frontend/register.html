<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NexoreX</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f4efe6 0%, #dbe7e4 100%);
            --panel: rgba(255, 255, 255, 0.92);
            --text: #1d2a2f;
            --muted: #5d6c70;
            --accent: #0f766e;
            --accent-dark: #115e59;
            --border: rgba(17, 94, 89, 0.14);
            --danger: #b42318;
            --success: #166534;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
            opacity: 0;
            animation: fadeIn 0.45s ease forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            width: min(100%, 440px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 24px 80px rgba(15, 118, 110, 0.12);
            backdrop-filter: blur(10px);
            animation: slideUp 0.5s ease both;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
        }

        form {
            display: grid;
            gap: 14px;
        }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .role-option {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.7);
        }

        .role-option input {
            margin: 0 8px 0 0;
            width: auto;
        }

        label {
            font-size: 0.95rem;
            font-weight: 700;
        }

        input {
            width: 100%;
            margin-top: 6px;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            font: inherit;
            background: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: 2px solid rgba(15, 118, 110, 0.18);
            border-color: var(--accent);
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 14px 18px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 10px 24px rgba(15, 118, 110, 0.18);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(15, 118, 110, 0.28);
        }

        button:active { transform: translateY(0); }

        button:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .message {
            min-height: 24px;
            margin-top: 14px;
            font-size: 0.95rem;
        }

        .message.error {
            color: var(--danger);
        }

        .message.success {
            color: var(--success);
        }

        .links {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        a {
            color: var(--accent-dark);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Create Account</h1>
        <p>Use a real email and a password with at least 8 characters.</p>

        <form id="registerForm">
            <label>
                Full Name
                <input id="name" name="name" type="text" maxlength="100" autocomplete="name" required>
            </label>

            <label>
                Email Address
                <input id="email" name="email" type="email" autocomplete="email" required>
            </label>

            <div>
                <label style="display:block; margin-bottom: 8px;">Account Type</label>
                <div class="role-grid">
                    <label class="role-option">
                        <input type="radio" name="role" value="buyer" checked>
                        Buyer
                    </label>

                    <label class="role-option">
                        <input type="radio" name="role" value="seller">
                        Seller
                    </label>
                </div>
            </div>

            <label>
                Password
                <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>
            </label>

            <label>
                Confirm Password
                <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required>
            </label>

            <button id="submitBtn" type="submit">Register</button>
        </form>

        <div id="message" class="message" aria-live="polite"></div>

        <div class="links">
            <a href="./index.html">Home</a>
            <a href="./login.html">Already have an account?</a>
        </div>
    </main>

    <script>
        const form = document.getElementById('registerForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        function setMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            setMessage('', '');

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const role = document.querySelector('input[name="role"]:checked').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!name || !email || !password || !confirmPassword) {
                setMessage('Please complete all fields.', 'error');
                return;
            }

            if (password.length < 8) {
                setMessage('Password must be at least 8 characters long.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                setMessage('Passwords do not match.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                const response = await fetch('https://nexorex.onrender.com/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password, role })
                });

                const data = await response.json();

                if (!response.ok) {
                    setMessage(data.message || 'Registration failed.', 'error');
                    return;
                }

                form.reset();
                setMessage('Registration successful. Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = `./login.html?email=${encodeURIComponent(email)}&role=${encodeURIComponent(role)}`;
                }, 1200);
            } catch (error) {
                setMessage('Could not connect to the server.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            }
        });
    </script>
</body>
</html>
