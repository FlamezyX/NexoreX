<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NexoreX</title>
    <link rel="stylesheet" href="./theme.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            opacity: 0;
            animation: fadeIn 0.45s ease forwards;
        }

        @keyframes fadeIn  { to { opacity: 1; } }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card {
            width: min(100%, 440px);
            padding: 32px;
            animation: slideUp 0.5s ease both;
        }

        h1 { margin: 0 0 8px; font-size: clamp(2rem, 4vw, 2.8rem); line-height: 1; }

        p { margin: 0 0 24px; }

        form { display: grid; gap: 14px; }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        input {
            width: 100%;
            margin-top: 6px;
            padding: 14px 16px;
            font: inherit;
        }

        .role-option input {
            width: auto;
            margin: 0 8px 0 0;
        }

        .submit-btn {
            width: 100%;
            padding: 14px 18px;
            font-weight: 700;
        }

        .message { min-height: 24px; margin-top: 14px; font-size: 0.95rem; }

        .links {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .theme-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <main class="card panel">
        <div class="theme-row">
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">☀️</button>
        </div>

        <h1>Create Account</h1>
        <p class="muted">Use a real email and a password with at least 8 characters.</p>

        <form id="registerForm">
            <label>
                Full Name
                <input id="name" name="name" type="text" maxlength="100" autocomplete="name" required>
            </label>

            <label>
                Email Address
                <input id="email" name="email" type="email" autocomplete="email" required>
            </label>

            <div>
                <label style="display:block; margin-bottom:8px;">Account Type</label>
                <div class="role-grid">
                    <label class="role-option">
                        <input type="radio" name="role" value="buyer" checked>
                        Buyer
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="seller">
                        Seller
                    </label>
                </div>
            </div>

            <label>
                Password
                <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>
            </label>

            <label>
                Confirm Password
                <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required>
            </label>

            <button class="button submit-btn" id="submitBtn" type="submit">Register</button>
        </form>

        <div id="message" class="message" aria-live="polite"></div>

        <div class="links">
            <a href="./index.html">Home</a>
            <a href="./login.html">Already have an account?</a>
        </div>
    </main>

    <script src="./app.js"></script>
    <script>
        initTheme();

        // ── Register logic ──
        const form      = document.getElementById('registerForm');
        const message   = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        function setMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            setMessage('', '');

            const name            = document.getElementById('name').value.trim();
            const email           = document.getElementById('email').value.trim().toLowerCase();
            const role            = document.querySelector('input[name="role"]:checked').value;
            const password        = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!name || !email || !password || !confirmPassword) {
                setMessage('Please complete all fields.', 'error');
                return;
            }

            if (password.length < 8) {
                setMessage('Password must be at least 8 characters long.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                setMessage('Passwords do not match.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                const response = await fetch(apiUrl('/api/auth/register'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });

                const data = await response.json();

                if (!response.ok) {
                    setMessage(data.message || 'Registration failed.', 'error');
                    return;
                }

                form.reset();
                setMessage('Registration successful. Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = `./login.html?email=${encodeURIComponent(email)}&role=${encodeURIComponent(role)}`;
                }, 1200);
            } catch (error) {
                setMessage('Could not connect to the server.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            }
        });
    </script>
</body>
</html>
