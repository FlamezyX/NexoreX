<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NexoreX</title>
    <style>
        :root {
            --bg: radial-gradient(circle at top, #f7efe1 0%, #dae8f0 45%, #cadfd7 100%);
            --panel: rgba(255, 255, 255, 0.93);
            --text: #1f2933;
            --muted: #5f6c76;
            --accent: #1d4ed8;
            --accent-dark: #1e3a8a;
            --border: rgba(30, 58, 138, 0.14);
            --danger: #b42318;
            --success: #166534;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Trebuchet MS", Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
            opacity: 0;
            animation: fadeIn 0.45s ease forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            width: min(100%, 430px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 32px;
            box-shadow: 0 24px 80px rgba(30, 58, 138, 0.12);
            animation: slideUp 0.5s ease both;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 2.7rem);
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            font-size: 0.95rem;
            font-weight: 700;
        }

        input {
            width: 100%;
            margin-top: 6px;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            font: inherit;
            background: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: 2px solid rgba(29, 78, 216, 0.18);
            border-color: var(--accent);
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 14px 18px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 10px 24px rgba(29, 78, 216, 0.18);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(29, 78, 216, 0.26);
        }

        button:active { transform: translateY(0); }

        button:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .message {
            min-height: 24px;
            margin-top: 14px;
            font-size: 0.95rem;
        }

        .message.error {
            color: var(--danger);
        }

        .message.success {
            color: var(--success);
        }

        .links {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        a {
            color: var(--accent-dark);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
        <link rel="stylesheet" href="./theme.css">
</head>
<body>
    <main class="card">
        <h1>Welcome Back</h1>
        <p>Sign in to continue. Your password never comes back in the login response.</p>

        <form id="loginForm">
            <label>
                Email Address
                <input id="email" name="email" type="email" autocomplete="email" required>
            </label>

            <label>
                Password
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </label>

            <button id="submitBtn" type="submit">Login</button>
        </form>

        <div id="message" class="message" aria-live="polite"></div>

        <div class="links">
            <a href="./index.html">Home</a>
            <a href="./forgot-password.html">Forgot password?</a>
            <a href="./register.html">Create an account</a>
        </div>
    </main>

    <script src="./app.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const params = new URLSearchParams(window.location.search);

        function setMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
        }

        const prefilledEmail = params.get('email');
        if (prefilledEmail) {
            document.getElementById('email').value = prefilledEmail;
            document.getElementById('password').focus();
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            setMessage('', '');

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                setMessage('Please enter your email and password.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const response = await fetch(apiUrl('/api/auth/login'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    setMessage(data.message || 'Login failed.', 'error');
                    return;
                }

                localStorage.setItem('nexorexToken', data.token);
                localStorage.setItem('nexorexUser', JSON.stringify(data.user));
                setMessage(`Logged in as ${data.user.name}. Redirecting...`, 'success');
                setTimeout(() => {
                    window.location.href = data.user.role === 'admin'
                        ? './admin-dashboard.html'
                        : data.user.role === 'seller'
                            ? './seller-dashboard.html'
                            : './buyer-dashboard.html';
                }, 1200);
            } catch (error) {
                setMessage('Could not connect to the server.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
