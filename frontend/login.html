<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NexoreX</title>
    <link rel="stylesheet" href="./theme.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            opacity: 0;
            animation: fadeIn 0.45s ease forwards;
        }

        @keyframes fadeIn  { to { opacity: 1; } }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card {
            width: min(100%, 430px);
            padding: 32px;
            animation: slideUp 0.5s ease both;
        }

        h1 { margin: 0 0 8px; font-size: clamp(2rem, 4vw, 2.7rem); }

        p { margin: 0 0 24px; }

        form { display: grid; gap: 14px; }

        input {
            width: 100%;
            margin-top: 6px;
            padding: 14px 16px;
            font: inherit;
        }

        .submit-btn {
            width: 100%;
            padding: 14px 18px;
            font-weight: 700;
        }

        .message { min-height: 24px; margin-top: 14px; font-size: 0.95rem; }

        .links {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .theme-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <main class="card panel">
        <div class="theme-row">
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">☀️</button>
        </div>

        <h1>Welcome Back</h1>
        <p class="muted">Sign in to continue. Your password never comes back in the login response.</p>

        <form id="loginForm">
            <label>
                Email Address
                <input id="email" name="email" type="email" autocomplete="email" required>
            </label>

            <label>
                Password
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </label>

            <button class="button submit-btn" id="submitBtn" type="submit">Login</button>
        </form>

        <div id="message" class="message" aria-live="polite"></div>

        <div class="links">
            <a href="./index.html">Home</a>
            <a href="./forgot-password.html">Forgot password?</a>
            <a href="./register.html">Create an account</a>
        </div>
    </main>

    <script src="./app.js"></script>
    <script>
        // ── Favicon ──
        (function () {
            const c = document.createElement('canvas');
            c.width = 64; c.height = 64;
            const ctx = c.getContext('2d');
            const g = ctx.createLinearGradient(0, 0, 64, 64);
            g.addColorStop(0, '#0077aa');
            g.addColorStop(0.5, '#00d4ff');
            g.addColorStop(1, '#a78bfa');
            ctx.fillStyle = g;
            ctx.roundRect(0, 0, 64, 64, 14);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('NX', 32, 33);
            const link = document.createElement('link');
            link.rel = 'icon'; link.href = c.toDataURL();
            document.head.appendChild(link);
        })();

        // ── Theme toggle ──
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('nexoreTheme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'light' ? '🌙' : '☀️';

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('nexoreTheme', next);
            themeToggle.textContent = next === 'light' ? '🌙' : '☀️';
        });

        // ── Login logic ──
        const form      = document.getElementById('loginForm');
        const message   = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const params    = new URLSearchParams(window.location.search);

        function setMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
        }

        const prefilledEmail = params.get('email');
        if (prefilledEmail) {
            document.getElementById('email').value = prefilledEmail;
            document.getElementById('password').focus();
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            setMessage('', '');

            const email    = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                setMessage('Please enter your email and password.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const response = await fetch(apiUrl('/api/auth/login'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    setMessage(data.message || 'Login failed.', 'error');
                    return;
                }

                localStorage.setItem('nexorexToken', data.token);
                localStorage.setItem('nexorexUser', JSON.stringify(data.user));
                setMessage(`Logged in as ${data.user.name}. Redirecting...`, 'success');
                setTimeout(() => {
                    window.location.href = data.user.role === 'admin'
                        ? './admin-dashboard.html'
                        : data.user.role === 'seller'
                            ? './seller-dashboard.html'
                            : './buyer-dashboard.html';
                }, 1200);
            } catch (error) {
                setMessage('Could not connect to the server.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
