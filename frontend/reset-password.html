<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | NexoreX</title>
    <style>
        :root {
            --bg: radial-gradient(circle at top, #f7efe1 0%, #dae8f0 45%, #cadfd7 100%);
            --panel: rgba(255,255,255,0.93);
            --text: #1f2933;
            --muted: #5f6c76;
            --accent: #0f766e;
            --accent-dark: #115e59;
            --border: rgba(17,94,89,0.14);
            --danger: #b42318;
            --success: #166534;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: "Trebuchet MS", Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
            opacity: 0;
            animation: fadeIn 0.45s ease forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .card {
            width: min(100%, 430px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 32px;
            box-shadow: 0 24px 80px rgba(15,118,110,0.12);
            animation: slideUp 0.5s ease both;
        }
        h1 { margin-bottom: 8px; font-size: clamp(1.8rem, 4vw, 2.4rem); }
        p { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
        form { display: grid; gap: 14px; }
        label { font-size: 0.95rem; font-weight: 700; }
        input {
            width: 100%; margin-top: 6px;
            border: 1px solid var(--border); border-radius: 14px;
            padding: 14px 16px; font: inherit; background: #fff;
            transition: border-color 0.2s ease;
        }
        input:focus { outline: none; border-color: var(--accent); }
        button {
            border: 0; border-radius: 999px; padding: 14px 18px;
            font: inherit; font-weight: 700; cursor: pointer; color: #fff;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            box-shadow: 0 10px 24px rgba(15,118,110,0.18);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(15,118,110,0.28); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.7; cursor: wait; }
        .message { min-height: 24px; margin-top: 14px; font-size: 0.95rem; }
        .message.error { color: var(--danger); }
        .message.success { color: var(--success); }
        .links { margin-top: 18px; }
        a { color: var(--accent-dark); text-decoration: none; font-weight: 700; }
        .invalid-state { text-align: center; padding: 12px 0; }
        .invalid-state p { margin-bottom: 16px; }
    </style>
        <link rel="stylesheet" href="./theme.css">
</head>
<body>
    <main class="card">
        <div id="invalidState" class="invalid-state" style="display:none;">
            <h1>Invalid Link</h1>
            <p>This password reset link is missing or invalid. Please request a new one.</p>
            <a href="./forgot-password.html">Request a new reset link</a>
        </div>

        <div id="resetState">
            <h1>Reset Password</h1>
            <p>Enter your new password below. It must be at least 8 characters.</p>

            <form id="resetForm">
                <label>
                    New Password
                    <input id="password" type="password" minlength="8" autocomplete="new-password" required>
                </label>
                <label>
                    Confirm New Password
                    <input id="confirmPassword" type="password" minlength="8" autocomplete="new-password" required>
                </label>
                <button id="submitBtn" type="submit">Update Password</button>
            </form>

            <div id="message" class="message" aria-live="polite"></div>

            <div class="links">
                <a href="./login.html">Back to Login</a>
            </div>
        </div>
    </main>

    <script src="./app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.getElementById('invalidState').style.display = 'block';
            document.getElementById('resetState').style.display = 'none';
        }

        const form = document.getElementById('resetForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        function setMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password.length < 8) { setMessage('Password must be at least 8 characters.', 'error'); return; }
            if (password !== confirm) { setMessage('Passwords do not match.', 'error'); return; }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';
            setMessage('', '');

            try {
                const res = await fetch(apiUrl('/api/auth/reset-password'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                if (!res.ok) { setMessage(data.message || 'Could not reset password.', 'error'); return; }

                setMessage(data.message, 'success');
                form.style.display = 'none';
                setTimeout(() => { window.location.href = './login.html'; }, 1800);
            } catch {
                setMessage('Could not connect to the server.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        });
    </script>
</body>
</html>
