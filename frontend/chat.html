<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoreX | Messages</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg: linear-gradient(180deg, #f6efe5 0%, #f6f5ef 32%, #dce7ea 100%);
            --surface: rgba(255,255,255,0.88);
            --surface-strong: rgba(255,255,255,0.96);
            --text: #1f2933;
            --muted: #5f6b73;
            --line: rgba(15,23,42,0.1);
            --brand: #c05621;
            --brand-deep: #7c2d12;
            --teal: #0f766e;
            --shadow: 0 28px 80px rgba(31,41,51,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(192,86,33,0.14), transparent 30%),
                radial-gradient(circle at top right, rgba(15,118,110,0.16), transparent 34%),
                var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }

        header { padding: 22px 0; }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 16px 50px rgba(31,41,51,0.08);
        }

        .brand strong { font-size: 1.35rem; letter-spacing: 0.06em; text-transform: uppercase; }
        .brand span { color: var(--muted); font-size: 0.92rem; }

        .nav-links, .nav-actions { display: flex; gap: 12px; align-items: center; }

        .link {
            color: var(--text); text-decoration: none;
            padding: 10px 14px; border-radius: 999px;
            transition: background 0.2s;
        }
        .link:hover { background: rgba(31,41,51,0.06); }

        .button {
            border: 0; border-radius: 999px; padding: 11px 18px;
            cursor: pointer; color: #fff; text-decoration: none; font: inherit;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
            box-shadow: 0 12px 25px rgba(124,45,18,0.18);
        }

        .button.ghost {
            background: rgba(255,255,255,0.55);
            border: 1px solid var(--line);
            color: var(--text);
            box-shadow: none;
        }

        .button.whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
            box-shadow: 0 8px 20px rgba(37,211,102,0.3);
        }

        /* Chat layout */
        .chat-wrap {
            flex: 1;
            padding-bottom: 36px;
        }

        .chat-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 18px;
            height: calc(100vh - 160px);
            min-height: 500px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.75);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-head {
            padding: 20px 22px 16px;
            border-bottom: 1px solid var(--line);
            flex-shrink: 0;
        }

        .panel-head h2 { font-size: 1.2rem; margin-bottom: 4px; }
        .panel-head p { color: var(--muted); font-size: 0.9rem; }

        /* Conversations list */
        .conv-list { flex: 1; overflow-y: auto; padding: 10px; }

        .conv-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 18px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }

        .conv-item:hover, .conv-item.active {
            background: rgba(192,86,33,0.08);
        }

        .conv-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, var(--brand), var(--teal));
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1.1rem; font-weight: 700;
            flex-shrink: 0;
        }

        .conv-info { flex: 1; min-width: 0; }
        .conv-name { font-weight: 700; font-size: 0.95rem; }
        .conv-preview {
            color: var(--muted); font-size: 0.85rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .conv-badge {
            background: var(--brand);
            color: #fff;
            border-radius: 999px;
            font-size: 0.75rem;
            padding: 2px 8px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .online-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #22c55e;
            position: absolute; bottom: 12px; left: 46px;
            border: 2px solid white;
        }

        /* Message area */
        .msg-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .msg-head {
            padding: 16px 22px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }

        .msg-head-info { display: flex; align-items: center; gap: 12px; }
        .msg-head h3 { font-size: 1.1rem; margin-bottom: 2px; }
        .msg-head-status { color: var(--muted); font-size: 0.85rem; }

        .msg-head-actions { display: flex; gap: 10px; align-items: center; }

        .msg-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-bubble {
            max-width: 68%;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
        }

        .msg-bubble.mine {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--brand), var(--brand-deep));
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .msg-bubble.theirs {
            align-self: flex-start;
            background: var(--surface-strong);
            border: 1px solid var(--line);
            border-bottom-left-radius: 6px;
        }

        .msg-time {
            font-size: 0.75rem;
            margin-top: 4px;
            opacity: 0.7;
        }

        .msg-product-ref {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            margin-bottom: 6px;
            display: inline-block;
        }

        .msg-bubble.theirs .msg-product-ref {
            background: rgba(192,86,33,0.1);
            color: var(--brand-deep);
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 10px 16px;
            background: var(--surface-strong);
            border: 1px solid var(--line);
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            color: var(--muted);
            font-size: 0.88rem;
            display: none;
        }

        .msg-input-wrap {
            padding: 16px 20px;
            border-top: 1px solid var(--line);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .msg-input {
            flex: 1;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 12px 16px;
            font: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            background: var(--surface-strong);
            max-height: 120px;
            min-height: 46px;
            transition: border-color 0.2s;
        }

        .msg-input:focus { border-color: var(--brand); }

        .empty-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }

        .empty-chat h3 { font-size: 1.4rem; margin-bottom: 10px; color: var(--text); }

        .no-conv {
            padding: 30px 20px;
            text-align: center;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.7;
        }

        @media (max-width: 780px) {
            .chat-layout { grid-template-columns: 1fr; height: auto; }
            .conv-panel { height: 260px; }
            .msg-area-panel { height: calc(100vh - 420px); min-height: 360px; }
        }
    </style>
</head>
<body>
    <header class="shell">
        <nav class="nav">
            <div class="brand">
                <strong>NexoreX</strong>
                <span>Messages</span>
            </div>
            <div class="nav-links">
                <a class="link" href="./index.html">Home</a>
                <a class="link" id="dashboardLink" href="./buyer-dashboard.html">Dashboard</a>
            </div>
            <div class="nav-actions">
                <button class="button ghost" id="logoutBtn" type="button">Logout</button>
            </div>
        </nav>
    </header>

    <main class="shell chat-wrap">
        <div class="chat-layout">
            <!-- Conversations sidebar -->
            <div class="panel conv-panel">
                <div class="panel-head">
                    <h2>Conversations</h2>
                    <p id="convSubtitle">Loading...</p>
                </div>
                <div class="conv-list" id="convList">
                    <div class="no-conv">Loading conversations...</div>
                </div>
            </div>

            <!-- Message area -->
            <div class="panel msg-area-panel">
                <div class="msg-area" id="msgArea">
                    <div class="empty-chat">
                        <div>
                            <h3>Select a conversation</h3>
                            <p>Choose a conversation from the left to start chatting.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="./app.js"></script>
    <script>
        const API = 'https://nexorex.onrender.com';
        let socket = null;
        let currentUser = null;
        let activeConv = null;
        let typingTimer = null;
        let onlineUserIds = new Set();

        function init() {
            currentUser = getStoredUser();
            const token = getStoredToken();

            if (!currentUser || !token) {
                window.location.href = './login.html';
                return;
            }

            // Set dashboard link based on role
            const dashLink = document.getElementById('dashboardLink');
            if (currentUser.role === 'seller') dashLink.href = './seller-dashboard.html';
            else if (currentUser.role === 'admin') dashLink.href = './admin-dashboard.html';

            document.getElementById('logoutBtn').addEventListener('click', logoutUser);

            connectSocket(token);
            loadConversations();

            // Check if we should open a specific conversation (from URL param)
            const params = new URLSearchParams(window.location.search);
            const openUserId = params.get('with');
            const productId = params.get('product');
            if (openUserId) {
                openConversation(Number(openUserId), null, productId ? Number(productId) : null);
            }
        }

        function connectSocket(token) {
            socket = io(API, { auth: { token } });

            socket.on('connect', () => {
                console.log('Socket connected');
            });

            socket.on('online_users', (ids) => {
                onlineUserIds = new Set(ids.map(Number));
                refreshOnlineStatus();
            });

            socket.on('user_online', ({ userId }) => {
                onlineUserIds.add(Number(userId));
                refreshOnlineStatus();
            });

            socket.on('user_offline', ({ userId }) => {
                onlineUserIds.delete(Number(userId));
                refreshOnlineStatus();
            });

            socket.on('new_message', (msg) => {
                if (activeConv && (msg.sender_id === activeConv.userId || msg.receiver_id === activeConv.userId)) {
                    appendMessage(msg);
                    scrollToBottom();
                }
                loadConversations();
            });

            socket.on('message_sent', (msg) => {
                appendMessage(msg);
                scrollToBottom();
                loadConversations();
            });

            socket.on('user_typing', ({ sender_id }) => {
                if (activeConv && sender_id === activeConv.userId) {
                    document.getElementById('typingIndicator').style.display = 'block';
                    scrollToBottom();
                }
            });

            socket.on('user_stop_typing', ({ sender_id }) => {
                if (activeConv && sender_id === activeConv.userId) {
                    document.getElementById('typingIndicator').style.display = 'none';
                }
            });
        }

        function refreshOnlineStatus() {
            document.querySelectorAll('.online-dot').forEach(dot => {
                const userId = Number(dot.dataset.userId);
                dot.style.display = onlineUserIds.has(userId) ? 'block' : 'none';
            });

            if (activeConv) {
                const statusEl = document.getElementById('convStatus');
                if (statusEl) {
                    statusEl.textContent = onlineUserIds.has(activeConv.userId) ? 'Online' : 'Offline';
                    statusEl.style.color = onlineUserIds.has(activeConv.userId) ? '#22c55e' : '';
                }
            }
        }

        async function loadConversations() {
            try {
                const res = await fetch(`${API}/api/chat/conversations`, {
                    headers: authHeaders()
                });
                const convs = await res.json();
                renderConversations(convs);
            } catch {
                document.getElementById('convList').innerHTML =
                    '<div class="no-conv">Could not load conversations.</div>';
            }
        }

        function renderConversations(convs) {
            const list = document.getElementById('convList');
            const subtitle = document.getElementById('convSubtitle');

            if (!convs.length) {
                list.innerHTML = '<div class="no-conv">No conversations yet.<br>Visit a seller\'s store and click "Message Seller" to start chatting.</div>';
                subtitle.textContent = '0 conversations';
                return;
            }

            subtitle.textContent = `${convs.length} conversation${convs.length === 1 ? '' : 's'}`;

            list.innerHTML = convs.map(conv => `
                <div class="conv-item ${activeConv && activeConv.userId === conv.user_id ? 'active' : ''}"
                     onclick="openConversation(${conv.user_id}, '${escHtml(conv.fullname)}')">
                    <div class="conv-avatar">${conv.fullname.charAt(0).toUpperCase()}</div>
                    <div class="online-dot" data-user-id="${conv.user_id}"
                         style="display:${onlineUserIds.has(conv.user_id) ? 'block' : 'none'}"></div>
                    <div class="conv-info">
                        <div class="conv-name">${escHtml(conv.fullname)}</div>
                        <div class="conv-preview">${escHtml(conv.last_message || '')}</div>
                    </div>
                    ${conv.unread_count > 0 ? `<span class="conv-badge">${conv.unread_count}</span>` : ''}
                </div>
            `).join('');
        }

        async function openConversation(userId, name, productId = null) {
            activeConv = { userId, name };

            // Highlight active conv
            document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.querySelector(`.conv-item[onclick*="openConversation(${userId},"]`);
            if (activeEl) activeEl.classList.add('active');

            // If name not provided, fetch it
            if (!name) {
                try {
                    const res = await fetch(`${API}/api/chat/${userId}`, { headers: authHeaders() });
                    const msgs = await res.json();
                    if (msgs.length) {
                        const other = msgs[0].sender_id === currentUser.id ? msgs[0].receiver_id : msgs[0].sender_id;
                        name = `User #${other}`;
                    }
                } catch {}
            }

            activeConv.name = name || `User #${userId}`;

            // Fetch seller's WhatsApp if available
            let whatsappNumber = null;
            try {
                const res = await fetch(`${API}/api/products/seller-profile/${userId}`);
                if (res.ok) {
                    const data = await res.json();
                    whatsappNumber = data.seller?.phone || null;
                }
            } catch {}

            renderChatArea(userId, activeConv.name, whatsappNumber, productId);
            await loadMessages(userId);
        }

        function renderChatArea(userId, name, whatsappNumber, productId) {
            const area = document.getElementById('msgArea');
            const isOnline = onlineUserIds.has(userId);
            const waLink = whatsappNumber
                ? `https://wa.me/${whatsappNumber.replace(/\D/g, '')}`
                : null;

            area.innerHTML = `
                <div class="msg-head">
                    <div class="msg-head-info">
                        <div class="conv-avatar" style="width:38px;height:38px;font-size:1rem;">
                            ${name.charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <h3>${escHtml(name)}</h3>
                            <div class="msg-head-status" id="convStatus"
                                 style="color:${isOnline ? '#22c55e' : ''}">
                                ${isOnline ? 'Online' : 'Offline'}
                            </div>
                        </div>
                    </div>
                    <div class="msg-head-actions">
                        ${waLink ? `
                            <a class="button whatsapp" href="${waLink}" target="_blank" rel="noopener noreferrer">
                                💬 WhatsApp
                            </a>
                        ` : ''}
                        ${currentUser && currentUser.role === 'buyer' ? `
                            <a class="button ghost" href="./report-seller.html?seller=${userId}"
                               style="color:#b42318; border-color:rgba(180,35,24,0.3); text-decoration:none;">
                                🚩 Report
                            </a>
                        ` : ''}
                    </div>
                </div>
                <div class="msg-list" id="msgList">
                    <div style="text-align:center;color:var(--muted);font-size:0.9rem;">Loading messages...</div>
                </div>
                <div class="typing-indicator" id="typingIndicator">${escHtml(name)} is typing...</div>
                <div class="msg-input-wrap">
                    <textarea class="msg-input" id="msgInput" rows="1"
                        placeholder="Type a message..."
                        onkeydown="handleInputKey(event)"
                        oninput="handleTyping()"></textarea>
                    <button class="button" type="button" onclick="sendMessage(${userId}, ${productId || null})">Send</button>
                </div>
            `;
        }

        async function loadMessages(userId) {
            try {
                const res = await fetch(`${API}/api/chat/${userId}`, { headers: authHeaders() });
                const messages = await res.json();
                const list = document.getElementById('msgList');
                if (!list) return;

                if (!messages.length) {
                    list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:0.9rem;padding:20px;">No messages yet. Say hello!</div>';
                    return;
                }

                list.innerHTML = messages.map(msg => renderBubble(msg)).join('');
                scrollToBottom();
                loadConversations(); // refresh unread counts
            } catch {
                const list = document.getElementById('msgList');
                if (list) list.innerHTML = '<div style="text-align:center;color:var(--muted);">Could not load messages.</div>';
            }
        }

        function renderBubble(msg) {
            const isMine = msg.sender_id === currentUser.id;
            const time = new Date(msg.created_at).toLocaleTimeString('en-NG', { hour: 'numeric', minute: '2-digit' });
            return `
                <div class="msg-bubble ${isMine ? 'mine' : 'theirs'}" data-id="${msg.message_id}">
                    ${msg.product_name ? `<div class="msg-product-ref">📦 Re: ${escHtml(msg.product_name)}</div>` : ''}
                    ${escHtml(msg.message)}
                    <div class="msg-time">${time}</div>
                </div>
            `;
        }

        function appendMessage(msg) {
            const list = document.getElementById('msgList');
            if (!list) return;
            // Remove empty state if present
            const empty = list.querySelector('div[style]');
            if (empty && !empty.dataset.id) empty.remove();
            list.insertAdjacentHTML('beforeend', renderBubble(msg));
        }

        function sendMessage(receiverId, productId) {
            const input = document.getElementById('msgInput');
            if (!input) return;
            const message = input.value.trim();
            if (!message) return;

            socket.emit('send_message', {
                receiver_id: receiverId,
                message,
                product_id: productId || null
            });

            input.value = '';
            input.style.height = 'auto';

            // Stop typing indicator
            socket.emit('stop_typing', { receiver_id: receiverId });
        }

        function handleInputKey(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                if (activeConv) sendMessage(activeConv.userId);
            }
            // Auto-resize textarea
            event.target.style.height = 'auto';
            event.target.style.height = Math.min(event.target.scrollHeight, 120) + 'px';
        }

        function handleTyping() {
            if (!activeConv || !socket) return;
            socket.emit('typing', { receiver_id: activeConv.userId });
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                socket.emit('stop_typing', { receiver_id: activeConv.userId });
            }, 1500);
        }

        function scrollToBottom() {
            const list = document.getElementById('msgList');
            if (list) list.scrollTop = list.scrollHeight;
        }

        function escHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        init();
    </script>
</body>
</html>
