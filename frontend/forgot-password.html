<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | NexoreX</title>
    <style>
        :root {
            --bg: radial-gradient(circle at top, #f7efe1 0%, #dae8f0 45%, #cadfd7 100%);
            --panel: rgba(255,255,255,0.93);
            --text: #1f2933;
            --muted: #5f6c76;
            --accent: #0f766e;
            --accent-dark: #115e59;
            --border: rgba(17,94,89,0.14);
            --danger: #b42318;
            --success: #166534;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: "Trebuchet MS", Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
            opacity: 0;
            animation: fadeIn 0.45s ease forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .card {
            width: min(100%, 430px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 32px;
            box-shadow: 0 24px 80px rgba(15,118,110,0.12);
            animation: slideUp 0.5s ease both;
        }
        h1 { margin-bottom: 8px; font-size: clamp(1.8rem, 4vw, 2.4rem); }
        p { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
        form { display: grid; gap: 14px; }
        label { font-size: 0.95rem; font-weight: 700; }
        input {
            width: 100%; margin-top: 6px;
            border: 1px solid var(--border); border-radius: 14px;
            padding: 14px 16px; font: inherit; background: #fff;
            transition: border-color 0.2s ease;
        }
        input:focus { outline: none; border-color: var(--accent); }
        button {
            border: 0; border-radius: 999px; padding: 14px 18px;
            font: inherit; font-weight: 700; cursor: pointer; color: #fff;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            box-shadow: 0 10px 24px rgba(15,118,110,0.18);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(15,118,110,0.28); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.7; cursor: wait; }
        .message { min-height: 24px; margin-top: 14px; font-size: 0.95rem; line-height: 1.6; }
        .message.error { color: var(--danger); }
        .message.success { color: var(--success); }
        .links { margin-top: 18px; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        a { color: var(--accent-dark); text-decoration: none; font-weight: 700; }

        /* Dev token box — only shown in development */
        .dev-box {
            margin-top: 16px; padding: 14px 16px;
            background: rgba(15,118,110,0.06);
            border: 1px dashed rgba(15,118,110,0.3);
            border-radius: 14px; display: none;
        }
        .dev-box p { margin: 0 0 8px; font-size: 0.85rem; color: var(--muted); }
        .dev-box a { font-size: 0.85rem; word-break: break-all; }
    </style>
</head>
<body>
    <main class="card">
        <h1>Forgot Password</h1>
        <p>Enter your account email and we'll generate a reset link for you.</p>

        <form id="forgotForm">
            <label>
                Email Address
                <input id="email" type="email" autocomplete="email" required>
            </label>
            <button id="submitBtn" type="submit">Send Reset Link</button>
        </form>

        <div id="message" class="message" aria-live="polite"></div>

        <div class="dev-box" id="devBox">
            <p>⚙️ Dev mode — email not configured yet. Use this link to reset:</p>
            <a id="devLink" href="#">Click here to reset your password</a>
        </div>

        <div class="links">
            <a href="./login.html">Back to Login</a>
            <a href="./register.html">Create an account</a>
        </div>
    </main>

    <script>
        const form = document.getElementById('forgotForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const devBox = document.getElementById('devBox');
        const devLink = document.getElementById('devLink');

        function setMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            if (!email) { setMessage('Please enter your email.', 'error'); return; }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            setMessage('', '');
            devBox.style.display = 'none';

            try {
                const res = await fetch('https://nexorex.onrender.com/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (!res.ok) { setMessage(data.message || 'Something went wrong.', 'error'); return; }

                setMessage(data.message, 'success');

                // Show dev link if token returned (no email configured yet)
                if (data.dev_token) {
                    const url = `./reset-password.html?token=${data.dev_token}`;
                    devLink.href = url;
                    devBox.style.display = 'block';
                }
            } catch {
                setMessage('Could not connect to the server.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
